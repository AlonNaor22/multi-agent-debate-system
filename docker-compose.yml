services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - debate-data:/app/data
    healthcheck:
      # python is always present in this image; curl is not in python:3.11-slim
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  debate-data:
